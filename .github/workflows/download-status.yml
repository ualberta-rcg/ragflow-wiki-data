name: Download Status Page

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  download-status:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download status page
        run: python scripts/download-status.py

      - name: Regenerate homepage
        run: python scripts/generate-homepage.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes (if any)
        run: |
          git add -A docs/status/ config/processing-state.json mkdocs-site/docs/index.md
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          ts="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          git commit -m "Update status page ($ts)"
          git push origin HEAD:${{ github.ref_name }}
