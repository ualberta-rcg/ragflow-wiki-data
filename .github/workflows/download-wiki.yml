name: Download Wiki Pages

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  download-wiki:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download wiki pages
        run: python scripts/download-wiki.py

      - name: Download events
        run: python scripts/download-events.py

      - name: Download status page
        run: python scripts/download-status.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes (if any)
        run: |
          git add -A docs/ manifest.json config/processing-state.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          NEW=$(grep -c '"change_status": "new"' manifest.json || echo 0)
          UPDATED=$(grep -c '"change_status": "updated"' manifest.json || echo 0)
          
          ts="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          git commit -m "Download all sources ($ts)

          Wiki - New: $NEW, Updated: $UPDATED
          Events and status pages also refreshed"
          git push origin HEAD:${{ github.ref_name }}
