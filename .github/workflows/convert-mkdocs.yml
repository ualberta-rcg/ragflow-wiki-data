name: Convert to MkDocs

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of docs to convert (0 = all)'
        required: false
        default: '0'

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  convert:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up venv and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Convert docs to MkDocs
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '0' }}
        run: |
          source venv/bin/activate
          python scripts/convert-to-mkdocs.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes (if any)
        run: |
          git add -A mkdocs-site/ config/processing-state.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          COUNT=$(git diff --staged --name-only -- 'mkdocs-site/*.md' | wc -l)
          ts="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          
          git commit -m "Convert $COUNT docs to MkDocs ($ts)"
          git push origin HEAD:${{ github.ref_name }}
